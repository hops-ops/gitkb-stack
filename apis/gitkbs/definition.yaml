apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: gitkbs.hops.ops.com.ai
spec:
  group: hops.ops.com.ai
  names:
    kind: GitKB
    plural: gitkbs
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        description: GitKB serves a GitKB knowledge base with optional Gateway API exposure, TLS certificate provisioning, and ExternalDNS integration.
        type: object
        properties:
          spec:
            description: GitKBSpec defines the desired state.
            type: object
            properties:
              clusterName:
                description: Name of the target cluster. Used as default for Helm and Kubernetes ProviderConfig names.
                type: string
              managementPolicies:
                description: Management policies applied to all composed resources. Defaults to ["*"].
                type: array
                items:
                  type: string
                default:
                - "*"
              labels:
                description: Custom labels merged with stack default labels and applied to all composed resources.
                type: object
                additionalProperties:
                  type: string
                x-kubernetes-preserve-unknown-fields: true
              providerConfigRefs:
                description: ProviderConfig references for composed Helm and Kubernetes resources. Each defaults to clusterName.
                type: object
                properties:
                  helm:
                    type: object
                    properties:
                      name:
                        type: string
                      kind:
                        type: string
                        enum:
                        - ProviderConfig
                        - ClusterProviderConfig
                  kubernetes:
                    type: object
                    properties:
                      name:
                        type: string
                      kind:
                        type: string
                        enum:
                        - ProviderConfig
                        - ClusterProviderConfig
              namespace:
                description: Namespace for the GitKB install. Defaults to "gitkb".
                type: string
              releaseName:
                description: Helm release name for the gitkb-server chart. Defaults to metadata.name.
                type: string
              chartVersion:
                description: Version of the gitkb-server chart. Defaults to "0.2.1".
                type: string
              gitkb:
                description: GitKB runtime settings passed to the chart.
                type: object
                properties:
                  org:
                    description: Organization or user segment used for the default public path.
                    type: string
                    default: hops-ops
                  repo:
                    description: Repository segment used for the default public path. Defaults to metadata.name.
                    type: string
                  name:
                    description: Human-readable GitKB display name used when initializing an empty KB.
                    type: string
                    default: GitKB Knowledge Base
                  root:
                    type: string
                    default: /data/kb
              image:
                description: gitkb-server image settings passed to the chart.
                type: object
                properties:
                  repository:
                    type: string
                    default: ghcr.io/hops-ops/gitkb-server
                  tag:
                    type: string
                    default: v0.1.0
                  pullPolicy:
                    type: string
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    default: IfNotPresent
              server:
                description: GitKB serve settings passed to the chart.
                type: object
                properties:
                  port:
                    type: integer
                    default: 8080
                  noEmbeddings:
                    type: boolean
                    default: true
                  logFormat:
                    type: string
                    enum:
                    - pretty
                    - compact
                    - json
                    default: json
              persistence:
                description: GitKB persistent storage settings.
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: true
                  size:
                    type: string
                    default: 10Gi
                  storageClassName:
                    type: string
                  existingClaim:
                    type: string
              seed:
                description: First-boot seed settings. The chart currently supports empty, existing, backup, and bundle.
                type: object
                properties:
                  mode:
                    type: string
                    enum:
                    - empty
                    - existing
                    - backup
                    - bundle
                    default: empty
                  fileName:
                    type: string
                  secretRef:
                    type: object
                    properties:
                      name:
                        type: string
                      key:
                        type: string
              startupCheck:
                description: Startup integrity check settings.
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: true
              exposure:
                description: Optional Gateway API exposure. Pair with auth.istioJwt for Istio ambient JWT enforcement before broad public use.
                type: object
                properties:
                  enabled:
                    description: Render HTTPRoute and optional TLS certificate/DNS annotations.
                    type: boolean
                    default: false
                  domain:
                    description: Public domain for GitKB, for example kb.ops.com.ai.
                    type: string
                  pathPrefix:
                    description: Public path prefix for this GitKB on the domain. Defaults to /<gitkb.org>/<gitkb.repo>; set to / for root routing.
                    type: string
                  serviceName:
                    description: Backend Service name. Defaults to the chart fullname for the chosen release.
                    type: string
                  gatewayRef:
                    description: Gateway parentRef to attach the HTTPRoute to.
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      sectionName:
                        description: Gateway listener section name, typically an HTTPS listener.
                        type: string
                  dns:
                    description: ExternalDNS annotations placed on the HTTPRoute.
                    type: object
                    properties:
                      enabled:
                        description: Add external-dns hostname annotation to the HTTPRoute. Defaults to exposure.enabled.
                        type: boolean
                      target:
                        description: Optional external-dns target annotation value.
                        type: string
                      ttl:
                        description: Optional external-dns TTL annotation value.
                        type: string
                      annotations:
                        description: Additional DNS controller annotations to place on the HTTPRoute.
                        type: object
                        additionalProperties:
                          type: string
                        x-kubernetes-preserve-unknown-fields: true
                  certificate:
                    description: Optional cert-manager Certificate for the exposure domain. The Gateway listener must already reference this Secret, or be managed by the Gateway owner to reference it.
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        default: false
                      secretName:
                        description: Secret where cert-manager stores the issued cert. Defaults to <releaseName>-tls.
                        type: string
                      secretNamespace:
                        description: Namespace for the cert Secret. Defaults to gatewayRef.namespace when set, otherwise the GitKB namespace.
                        type: string
                      issuerRef:
                        type: object
                        properties:
                          name:
                            type: string
                          kind:
                            type: string
                            enum:
                            - Issuer
                            - ClusterIssuer
                            default: ClusterIssuer
              auth:
                description: Optional authentication and mesh-policy resources for GitKB sync traffic.
                type: object
                properties:
                  oidcClient:
                    description: |
                      Dedicated Zitadel client-credentials identity for GitKB
                      CLI sync. When enabled, the composition creates its own
                      Zitadel Project, Role, MachineUser, and Grant. The
                      MachineUser connection Secret contains
                      `attribute.client_id` and `attribute.client_secret`;
                      use those values for GitKB CLI OAuth2
                      client_credentials authentication.
                    type: object
                    properties:
                      enabled:
                        description: Render the GitKB-owned Zitadel client identity.
                        type: boolean
                        default: false
                      issuer:
                        description: Expected OAuth/OIDC issuer, for example https://auth.ops.com.ai.
                        type: string
                      jwksUri:
                        description: JWKS URI for the issuer. If omitted, Istio may use OIDC discovery.
                        type: string
                      zitadelProviderConfigRef:
                        description: Zitadel ProviderConfig used to provision the Project, Role, MachineUser, and Grant.
                        type: object
                        properties:
                          name:
                            type: string
                          kind:
                            type: string
                            default: ProviderConfig
                      zitadelOrgId:
                        description: Zitadel Org ID that owns the GitKB Project and MachineUser.
                        type: string
                      projectName:
                        description: Zitadel Project name. Defaults to <releaseName>-gitkb.
                        type: string
                      roleKey:
                        description: Zitadel Role key granted to the GitKB MachineUser.
                        type: string
                        default: gitkb:sync
                      machineUserName:
                        description: MachineUser username. This becomes the OAuth2 client_id. Defaults to <releaseName>-sync.
                        type: string
                      clientSecretName:
                        description: Connection Secret name for client credentials. Defaults to <machineUserName>-secret.
                        type: string
                  istioJwt:
                    description: Istio ambient waypoint JWT enforcement for the GitKB Service. Requires an Istio ambient mesh and a valid issuer/JWKS configuration.
                    type: object
                    properties:
                      enabled:
                        description: Render ambient namespace labels, service waypoint labels, a waypoint Gateway, RequestAuthentication, and AuthorizationPolicy.
                        type: boolean
                        default: false
                      issuer:
                        description: Expected JWT issuer, for example https://auth.ops.com.ai.
                        type: string
                      jwksUri:
                        description: JWKS URI for the issuer. If omitted, Istio may use OIDC discovery for issuers that support it.
                        type: string
                      audiences:
                        description: Optional JWT audiences accepted by Istio, for example a Zitadel project ID.
                        type: array
                        items:
                          type: string
                      useOidcClientAudience:
                        description: Add the GitKB-owned Zitadel Project ID to accepted audiences once observed. Has no effect unless auth.oidcClient.enabled is true. Defaults to true.
                        type: boolean
                        default: true
                      requestPrincipals:
                        description: Request principals allowed by the AuthorizationPolicy. Defaults to ["*"] to require any valid JWT.
                        type: array
                        items:
                          type: string
                      waypoint:
                        description: Istio waypoint settings.
                        type: object
                        properties:
                          name:
                            description: Waypoint Gateway name. Defaults to <releaseName>-waypoint.
                            type: string
                          gatewayClassName:
                            description: GatewayClass used for the waypoint. Defaults to istio-waypoint.
                            type: string
                            default: istio-waypoint
              values:
                description: Helm values merged over stack defaults for the gitkb-server chart.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              overrideAllValues:
                description: Helm values that replace all stack defaults for the gitkb-server chart.
                type: object
                x-kubernetes-preserve-unknown-fields: true
            required:
            - clusterName
          status:
            description: GitKBStatus defines the observed state.
            type: object
            properties:
              ready:
                type: boolean
              release:
                type: object
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  ready:
                    type: boolean
              service:
                type: object
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  port:
                    type: integer
              exposure:
                type: object
                properties:
                  enabled:
                    type: boolean
                  domain:
                    type: string
                  url:
                    type: string
                  pathPrefix:
                    type: string
                  dnsEnabled:
                    type: boolean
                  certificateEnabled:
                    type: boolean
                  routeReady:
                    type: boolean
                  certificateReady:
                    type: boolean
              auth:
                type: object
                properties:
                  oidcClient:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      rendered:
                        type: boolean
                      issuer:
                        type: string
                      projectId:
                        description: Observed Zitadel Project ID. Use as the audience scope with urn:zitadel:iam:org:project:id:<projectId>:aud.
                        type: string
                      clientId:
                        description: Observed OAuth2 client_id for GitKB CLI client_credentials authentication.
                        type: string
                      clientSecretRef:
                        description: Secret containing the GitKB OAuth2 client credentials.
                        type: object
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                          clientIdKey:
                            type: string
                          clientSecretKey:
                            type: string
                      projectReady:
                        type: boolean
                      roleReady:
                        type: boolean
                      machineUserReady:
                        type: boolean
                      grantReady:
                        type: boolean
                  istioJwt:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      rendered:
                        type: boolean
                      issuer:
                        type: string
                      audiences:
                        type: array
                        items:
                          type: string
                      waypointReady:
                        type: boolean
                      requestAuthenticationReady:
                        type: boolean
                      authorizationPolicyReady:
                        type: boolean
        required:
        - spec
