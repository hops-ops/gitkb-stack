apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: gitkb-stack
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.4'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-helm
    version: '>=v1'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
    version: '>=v1'
  description: GitKBStack serves a GitKB knowledge base from the gitkb-server chart
    and optionally exposes it through Gateway API with TLS certificate and ExternalDNS
    wiring.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # gitkb-stack

    Installs GitKB into Kubernetes through the `gitkb-server` Helm chart.
    The stack owns namespace creation, chart installation, optional Gateway
    API HTTPRoute exposure, optional cert-manager Certificate provisioning,
    and ExternalDNS annotations.

    This first exposure pass is intentionally unauthenticated. Use it only
    on internal networks or behind a trusted Gateway until the OIDC policy
    pass lands.
  repository: ghcr.io/hops-ops/gitkb-stack
  source: github.com/hops-ops/gitkb-stack
