apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: gitkb-stack
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.4'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-helm
    version: '>=v1'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
    version: '>=v1'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-upjet-zitadel
    version: '>=v0.1.1'
  description: GitKB serves a GitKB knowledge base from the gitkb-server chart and
    optionally exposes it through Gateway API with TLS certificate and ExternalDNS
    wiring, plus a dedicated Zitadel client for authenticated sync.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # gitkb-stack

    GitKB installs a GitKB sync server into Kubernetes through the
    `gitkb-server` Helm chart from `https://hops-ops.github.io/gitkb-server-chart`.

    A `GitKB` claim owns namespace creation, chart installation, optional
    Gateway API HTTPRoute exposure, optional cert-manager Certificate
    provisioning, ExternalDNS annotations, and optional Zitadel
    OIDC auth. `spec.exposure.domain` is the public domain, while
    `spec.gitkb.org` and `spec.gitkb.repo` derive the default public path
    `/<org>/<repo>`, for example:

    `https://kb.ops.com.ai/hops-ops/hops`

    The HTTPRoute strips that prefix before forwarding traffic to
    `git-kb serve`, so many GitKB repos can share one Gateway domain. This
    For authenticated sync traffic, enable `auth.oidcClient` and
    `auth.istioJwt` so GitKB gets its own Zitadel device-flow client for human
    login, MachineUser client for automation, and Istio validates the shared
    project audience.
  repository: ghcr.io/hops-ops/gitkb-stack
  source: github.com/hops-ops/gitkb-stack
